name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install core dependencies
        working-directory: packages/core
        run: npm install

      - name: Type check
        working-directory: packages/core
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: packages/core
        run: npx vitest run

  rust:
    name: Rust Build
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/governor

      - name: Build Governor
        run: cargo build --release --manifest-path crates/governor/Cargo.toml

      - name: Test Governor
        run: cargo test --manifest-path crates/governor/Cargo.toml
